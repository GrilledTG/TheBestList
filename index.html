<!DOCTYPE html>
<html lang="en">
<head>
    <meta id="meta-title" property="og:title" content="The BEST List">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>Best List</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" href="/list_icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/typography.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/pages/list.css" />
    <link rel="stylesheet" href="/css/pages/list-packs.css" />
    <link rel="stylesheet" href="/css/pages/leaderboard.css" />
    <link rel="stylesheet" href="/css/pages/roulette.css" />
    <link rel="stylesheet" href="/css/components/nav.css" />
    <link rel="stylesheet" href="/css/components/btn.css" />
    <link rel="stylesheet" href="/css/components/tabs.css" />

    <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
    <script type="module" src="/js/main.js"></script>
</head>

<body id="app">

    <audio id="bg-audio" loop>
    <source src="/chaos.mp3" type="audio/mpeg">
    </audio>

    <button id="play-audio-btn" style="position:fixed;bottom:20px;left:20px;z-index:9999;">
        Play Music
    </button>

    <header :class="{ dark: store.dark }">
        <div class="logo">
            <h2>TBL</h2>
            <p>v1</p>
        </div>

        <nav class="nav">
            <router-link class="nav__tab" to="/">
                <span class="type-label-lg">List</span>
            </router-link>

            <router-link class="nav__tab" to="/">
                <span class="type-label-lg">List</span>
            </router-link>

            <router-link class="nav__tab" to="/">
                <span class="type-label-lg">List</span>
            </router-link>

            <router-link class="nav__tab" to="/leaderboard">
                <span class="type-label-lg">Leaderboard</span>
            </router-link>

            <router-link class="nav__tab" to="/roulette">
                <span class="type-label-lg">Roulette</span>
            </router-link>

            <div class="nav__actions">
                <button class="nav__icon" @click.prevent="store.toggleDark()">
                    <img :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'" alt="" />
                </button>

                <a class="nav__icon" href="https://i.ytimg.com/vi/Wks-hJV-5ck/maxresdefault.jpg">
                    <img src="/assets/discord.svg" alt="Discord Logo" />
                </a>

                <a class="nav__cta type-label-lg"
                   href="https://en.wikipedia.org/wiki/Giraffe"
                   target="_blank">
                   Giraffe
                </a>
            </div>
        </nav>
    </header>

    <router-view :class="{ dark: store.dark }"></router-view>

</html>
